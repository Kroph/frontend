spring:
  application:
    name: Diplom

  # =====================
  # OAUTH2 (GOOGLE + GITHUB)
  # =====================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email

  # =====================
  # MONGODB (ATLAS)
  # =====================
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

    # =====================
    # REDIS
    # =====================
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cache:
    type: redis

  # =====================
  # RABBITMQ
  # =====================
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  # =====================
  # MAIL (GMAIL SMTP)
  # =====================
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

  # =====================
  # FILE UPLOAD
  # =====================
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 550MB

  # =====================
  # THYMELEAF
  # =====================
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
# =====================
# LOGGING
# =====================
logging:
  level:
    org.springframework.cache: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    com.diploma.Diplom: DEBUG

# =====================
# JWT
# =====================
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

# =====================
# CLOUDINARY
# =====================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# =====================
# PAYPAL
# =====================
paypal:
  client-id: ${PAYPAL_CLIENT_ID}
  client-secret: ${PAYPAL_CLIENT_SECRET}
  base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  plan-id: ${PAYPAL_SUBSCRIPTION_PLAN_ID}

# =====================
# APP CONFIG
# =====================
app:
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  certificate:
    storage:
      path: ${CERTIFICATE_STORAGE_PATH:uploads/certificates}

# =====================
# SWAGGER (SPRINGDOC)
# =====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    doc-expansion: list
    disable-swagger-default-url: true

  api-docs:
    path: /v3/api-docs

  group-configs:
    - group: Authentication
      paths-to-match: /auth/**
    - group: Courses
      paths-to-match: /courses/**
    - group: Lessons
      paths-to-match: /lessons/**
    - group: Quizzes
      paths-to-match: /quizzes/**,/quiz-attempts/**
    - group: Progress & Certificates
      paths-to-match: /progress/**,/api/certificates/**
    - group: Enrollments & Payments
      paths-to-match: /enrollments/**,/payments/**,/subscriptions/**
    - group: Teacher Applications
      paths-to-match: /teacher-applications/**
    - group: Comments
      paths-to-match: /comments/**
    - group: Profiles
      paths-to-match: /profile/**
    - group: Admin
      paths-to-match: /admin/**

oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI}
